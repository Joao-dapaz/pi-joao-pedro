<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/static/style.css">
    <title>Maestro - Conexões musicais</title>
</head>

<body>
    <div id="container">
        <div id="logo">
            <img src="/static/img/Lira com Videira Minimalista(COPIA).png" alt="logo">
            <h1>MAESTRO</h1>
        </div>

        <div>
            <h2>Cadastre-se</h2>
            <form action="/cadastrar_aluno" method="post">
                <label>Nome:</label>
                <input type="text" name="nome" required>
                <label>Email:</label>
                <input type="email" name="email" required>
                <label>Número:</label>
                <input type="text" name="telefone" required>
                <label>Endereço:</label>
                <input type="text" name="endereco" required>
                <label>Senha:</label>
                <input type="password" name="senha" required>
                <button type="submit">Criar conta</button>
            </form>
        </div>

        {% with mensagens = get_flashed_messages() %}
        {% if mensagens %}
        <div class="toast align-items-center show text-bg-danger border-0 mt-3" role="alert" aria-live="assertive"
            aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body">
                    {{ mensagens[0] }}
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                    aria-label="Close"></button>
            </div>
        </div>
        {% endif %}
        {% endwith %}

    </div>
</body>

</html>
