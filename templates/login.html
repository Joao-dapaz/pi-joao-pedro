<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/static/style.css">
    <title>Maestro - Conexões musicais</title>
</head>

<body>
    <div id="container-login">
        <div id="logo">
            <img src="/static/img/Lira com Videira Minimalista(COPIA).png" alt="logo">
            <h1>MAESTRO</h1>
        </div>

        <div>
            <h2>Login do Aluno</h2>
            <form action="/fazer_login_aluno" method="post" id="form-login">

                <label>Tipo de conta:</label>
                <select id="tipoConta" onchange="mudarRota()">
                    <option value="aluno">Aluno</option>
                    <option value="professor">Professor</option>
                </select>
            
                <label>Email:</label>
                <input type="text" name="email" required>
            
                <label>Senha:</label>
                <input type="password" name="senha" required>
            
                <button type="submit">Entrar</button>
            
            </form>

            {% with mensagens = get_flashed_messages() %}
            {% if mensagens %}
            <div class="toast align-items-center show text-bg-danger border-0" role="alert" aria-live="assertive"
                aria-atomic="true">
                <div class="d-flex">
                    <div class="toast-body">
                        {{ mensagens[0] }}
                    </div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"
                        aria-label="Close"></button>
                </div>
            </div>
            {% endif %}
            {% endwith %}
        </div>
    </div>

</body>
<script>
    function mudarRota() {
        var tipo = document.getElementById("tipoConta").value;
        var form = document.getElementById("form-login");
    
        if (tipo === "professor") {
            form.action = "/fazer_login_professor";
        } else {
            form.action = "/fazer_login_aluno";
        }
    }
    </script>
</html>
