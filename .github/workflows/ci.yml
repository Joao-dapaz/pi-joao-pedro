# CI: testes unitários + E2E com Flask
name: CI

on: [push, pull_request, workflow_dispatch]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install flask pytest playwright pytest-playwright

      - name: Instalar Chromium (Playwright)
        run: python -m playwright install --with-deps chromium

      - name: Limpar banco antigo
        run: rm -f escola.db

      - name: Criar banco de dados
        run: python BANCO.py

      - name: Popular banco
        run: python inserts.py

      - name: Testes unitários
        run: python -m pytest tests/ -v

      - name: Rodar servidor Flask
        run: |
          python app.py &
          sleep 5

      - name: Testes E2E
        run: python -m pytest E2E/ -v